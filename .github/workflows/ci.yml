name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: build + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        # Version comes from package.json `packageManager` field
        # (pnpm@10.29.3). Do NOT add a `with: version: …` here —
        # pnpm/action-setup@v4 refuses to run when both sources are
        # set (ERR_PNPM_BAD_PM_VERSION). One source of truth.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

  integration:
    name: integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        # ECR Public mirror — registry-1.docker.io timed out 3x on
        # 2026-06-11 (known Docker Hub flake on shared runners).
        image: public.ecr.aws/docker/library/postgres:15-alpine
        env:
          POSTGRES_USER: suverse
          POSTGRES_PASSWORD: suverse
          POSTGRES_DB: suverse_pay
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U suverse -d suverse_pay"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://suverse:suverse@localhost:5433/suverse_pay
      REDIS_URL: redis://localhost:6380
      ADMIN_API_KEY: ci-integration-admin-key
      TEST_DATABASE_URL: postgres://suverse:suverse@localhost:5433/suverse_pay
      TEST_REDIS_URL: redis://localhost:6380

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        # Version comes from package.json `packageManager` field
        # (pnpm@10.29.3). Do NOT add a `with: version: …` here —
        # pnpm/action-setup@v4 refuses to run when both sources are
        # set (ERR_PNPM_BAD_PM_VERSION). One source of truth.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Apply migrations
        run: pnpm db:migrate

      - name: Bootstrap admin api_key
        run: pnpm db:bootstrap

      - name: Integration tests
        run: pnpm test:integration
