# Prometheus scrape config for suverse-pay's internal observability
# stack. Phase 4 Block 1 Sub-task 4.
#
# `host.docker.internal` resolves to the docker bridge gateway (set via
# `extra_hosts` in docker-compose.yml). Lets Prometheus, running inside
# a container, scrape apps/api running on the host without forcing the
# operator to also containerize the gateway.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    project: suverse-pay
    env: dev

scrape_configs:
  # apps/api exposes a Prometheus-format /metrics endpoint, populated
  # by `apps/api/src/lib/metrics.ts`. The refresher cron in apps/api
  # keeps the Postgres-backed gauges up to date on a 15s tick — same
  # cadence as this scrape, so a fresh value is always ready.
  - job_name: suverse-pay-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels:
          service: api

  # Prometheus's own self-metrics. Cheap, useful when debugging the
  # scrape pipeline itself.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
