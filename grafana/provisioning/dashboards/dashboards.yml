# Grafana dashboard provisioner — auto-loads any JSON file from
# /var/lib/grafana/dashboards (volume-mounted from ./grafana/dashboards
# in docker-compose).
#
# Phase 4 Block 1 Sub-task 4. To add a new dashboard: drop a JSON file
# in `grafana/dashboards/` and restart Grafana (or just wait — the
# UpdateIntervalSeconds is 30s).

apiVersion: 1

providers:
  - name: suverse-pay
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
