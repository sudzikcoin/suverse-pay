# nginx site config for facilitator.suverse.io
#
# This exposes the suverse-pay facilitator API (the Fastify app
# listening on 127.0.0.1:3000) at https://facilitator.suverse.io/...
# so resource servers running on third-party hosts can reach our
# /facilitator/verify, /facilitator/settle, /facilitator/supported,
# and /facilitator/health endpoints.
#
# Apply with:
#   sudo cp deploy/nginx-facilitator.suverse.io.conf \
#       /etc/nginx/sites-available/facilitator.suverse.io
#   sudo ln -sf ../sites-available/facilitator.suverse.io \
#       /etc/nginx/sites-enabled/facilitator.suverse.io
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d facilitator.suverse.io \
#       --non-interactive --agree-tos -m sudzikgroup@gmail.com --redirect
#
# After certbot runs it rewrites the `listen` block + adds the
# managed-cert + redirect blocks at the bottom — do NOT edit this
# file after that point without re-running `nginx -t`.

limit_req_zone $binary_remote_addr zone=facilitator:10m rate=60r/m;

server {
    server_name facilitator.suverse.io;

    # Reject anything that isn't a facilitator endpoint. Cheap firewall
    # — keeps random scanners from poking around.
    location / {
        return 404;
    }

    location /facilitator/ {
        # 60 req / minute / IP; allow a small burst (e.g. a probe page
        # firing all checks in sequence). `nodelay` answers
        # immediately above the rate when the burst budget is fresh.
        limit_req zone=facilitator burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Facilitator bodies (verify + settle envelopes) are < 5 KB
        # in practice. Cap at 1 MB so a hostile client can't stream
        # gigabytes to our Fastify socket.
        client_max_body_size 1m;

        # Verify is sub-second, settle waits for a chain confirmation
        # (~2-5s on Base, longer for Cosmos). 60s leaves headroom.
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # CORS — facilitator is a third-party HTTP API for resource
        # servers, NOT for browsers. We still let browsers preflight
        # so a wallet UI experimenting with the protocol doesn't
        # immediately fail; ALC permissive is fine because every real
        # write to /settle requires a Bearer token the browser cannot
        # safely hold anyway.
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Idempotency-Key" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    listen 80;
    # certbot will add `listen 443 ssl` + managed-cert lines below
    # after the first `--nginx -d facilitator.suverse.io` run. Do not
    # add them by hand.
}
