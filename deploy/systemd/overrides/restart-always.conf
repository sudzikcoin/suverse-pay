# Task 53 drop-in for smart-money-api + polymarket-api (their unit
# files live with their own repos): upgrade Restart=on-failure to
# always so clean-exit crashes also respawn.
# Apply (per service):
#   sudo mkdir -p /etc/systemd/system/<svc>.service.d
#   sudo cp deploy/systemd/overrides/restart-always.conf /etc/systemd/system/<svc>.service.d/
#   sudo systemctl daemon-reload && sudo systemctl restart <svc>
[Service]
Restart=always
