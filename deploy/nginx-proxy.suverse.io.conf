# nginx site config for proxy.suverse.io
#
# Exposes the self-serve x402 proxy (apps/proxy, Fastify on
# 127.0.0.1:3003) at https://proxy.suverse.io/...
#
# Apply with:
#   sudo cp deploy/nginx-proxy.suverse.io.conf \
#       /etc/nginx/sites-available/proxy.suverse.io
#   sudo ln -sf ../sites-available/proxy.suverse.io \
#       /etc/nginx/sites-enabled/proxy.suverse.io
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d proxy.suverse.io \
#       --non-interactive --agree-tos -m sudzikgroup@gmail.com --redirect

# Outer rate-limit zone. The Fastify app already has a per-(slug,IP)
# limiter at 120 req/min — this nginx zone is a wider safety net at
# 600 req/min/IP so a single noisy IP can't saturate the upstream
# socket while many slugs are in flight.
limit_req_zone $binary_remote_addr zone=proxy_edge:10m rate=600r/m;

server {
    server_name proxy.suverse.io;

    # Bare root: same play as the facilitator host — 404 random
    # scanners. The only public surface is /v1/proxy/* + /health.
    location = / {
        return 404;
    }

    location = /health {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
    }

    # /v1/swap/solana/... — SuVerse Solana Swap (Jupiter-routed). Two
    # routes: /quote (free) and /execute/{quote_id} (x402-paid with
    # per-quote dynamic price). Settle + Jupiter swap + transfer can
    # take ~45s on busy Solana slots, so the read timeout is generous.
    location /v1/swap/ {
        limit_req zone=proxy_edge burst=60 nodelay;

        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_connect_timeout 10s;
        client_max_body_size 1m;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Idempotency-Key, PAYMENT-SIGNATURE, X-PAYMENT" always;
        add_header Access-Control-Expose-Headers "PAYMENT-REQUIRED, PAYMENT-RESPONSE, X-PAYMENT-RESPONSE" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location /v1/proxy/ {
        limit_req zone=proxy_edge burst=120 nodelay;

        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Forwarded bodies — APIs occasionally accept multi-megabyte
        # POSTs (PDF parsers etc). Cap at 8 MB, matching what most
        # public APIs allow at their edge.
        client_max_body_size 8m;

        # The slowest leg is upstream → buyer (settle finishes in
        # 2-5s on Base, then the upstream call takes whatever it
        # takes). 120s leaves room for slow APIs without holding the
        # socket forever.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        # CORS is permissive — proxies are consumed by browser-side
        # clients too. The PAYMENT-RESPONSE header is the only piece
        # of metadata browsers need to read, and it's already
        # explicitly exposed by the Fastify handler.
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Idempotency-Key, PAYMENT-SIGNATURE, X-PAYMENT" always;
        add_header Access-Control-Expose-Headers "PAYMENT-REQUIRED, PAYMENT-RESPONSE, X-PAYMENT-RESPONSE" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    listen 80;
    # certbot adds `listen 443 ssl` + managed-cert lines below after
    # `--nginx -d proxy.suverse.io`. Do not edit by hand.
}
